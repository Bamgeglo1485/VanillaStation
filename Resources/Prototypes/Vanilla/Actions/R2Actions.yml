- type: entity
  id: ActionDashR2
  name: Dash
  description: +Tactical Retreat
  components:
  - type: InstantAction
    useDelay: 20
    event: !type:PolymorphActionEvent
      protoId: R2Dash
    itemIconStyle: NoItem
    icon:
      sprite: Vanilla/Actions/R1.rsi
      state: Dash

- type: polymorph
  id: R2Dash
  configuration:
    entity: R2DashEntity
    transferName: true
    forced: true
    revertOnDeath: true
    revertOnCrit: true
    allowRepeatedMorphs: false
    exitPolymorphSound: /Audio/Vanilla/Effects/R1/Slam.ogg
    duration: 4

- type: entity
  parent: R1DashEntity
  categories: [ HideSpawnMenu ]
  id: R2DashEntity
  components:
  - type: Sprite
    layers:
    - state: R2_Dash
  - type: SpawnOnTrigger
    proto: R2DashTrack
  - type: TimedSpawner
    prototypes:
    - R2DashTrack
    chance: 1
    intervalSeconds: 1
    minimumEntitiesSpawned: 1
    maximumEntitiesSpawned: 1

- type: entity
  parent: R1DashTrack
  categories: [ HideSpawnMenu ]
  id: R2DashTrack
  components:
  - type: Sprite
    layers:
    - state: R2_Dash

- type: entity
  categories: [ HideSpawnMenu ]
  id: FistfulOfDollarR2
  name: fistful of dollar
  description: +fistful of dollar
  components:
  - type: RechargeBasicEntityAmmo
    rechargeCooldown: 6
  - type: BasicEntityAmmoProvider
    proto: ReflectCoinR2
    capacity: 4
    count: 4
  - type: Gun
    soundEmpty: null
    projectileSpeed: 6
    soundGunshot:
      path: /Audio/Vanilla/Effects/R1/Coin.ogg

- type: entity
  id: FistfulOfDollarActionR2
  name: Fistful Of Dollar
  description: +Fistful Of Dollar +Ricoshot
  components:
  - type: WorldTargetAction
    icon: { sprite : Vanilla/Actions/R1.rsi, state: Fistful }
    event: !type:ActionGunShootEvent
    priority: 1
    checkCanAccess: false
    range: 0
    itemIconStyle: BigAction
  - type: InstantAction
    sound: !type:SoundPathSpecifier
      path: /Audio/Vanilla/Effects/R1/Fistful.ogg
