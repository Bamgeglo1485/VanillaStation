- type: entity
  id: ActionSlam
  name: Slam
  description: +Ground Slam
  components:
  - type: RepulseAttract
    speed: 25
    range: 6
    whitelist:
      components:
      - MobMover
      - Item
  - type: InstantAction
    useDelay: 20
    raiseOnAction: true
    itemIconStyle: BigAction
    sound: !type:SoundPathSpecifier
      path: /Audio/Vanilla/Effects/R1/Slam.ogg
    icon:
      sprite: Vanilla/Actions/R1.rsi
      state: Slam
    event: !type:RepulseAttractActionEvent

- type: entity
  id: ActionDash
  name: Dash
  description: +Tactical Retreat
  components:
  - type: InstantAction
    useDelay: 20
    event: !type:PolymorphActionEvent
      protoId: R1Dash
    itemIconStyle: NoItem
    icon:
      sprite: Vanilla/Actions/R1.rsi
      state: Dash

- type: polymorph
  id: R1Dash
  configuration:
    entity: R1DashEntity
    transferName: true
    forced: true
    revertOnDeath: true
    revertOnCrit: true
    allowRepeatedMorphs: false
    exitPolymorphSound: /Audio/Vanilla/Effects/R1/Slam.ogg
    duration: 4

- type: entity
  parent: [BaseMob, Incorporeal]
  categories: [ HideSpawnMenu ]
  id: R1DashEntity
  components:
  - type: Sprite
    sprite: Vanilla/Mobs/Silicon/chassis.rsi
    layers:
    - state: R1_Dash
  - type: NpcFactionMember
    factions:
    - Dragon
  - type: MovementSpeedModifier
    baseWalkSpeed : 7.5
    baseSprintSpeed : 7.5
  - type: FootstepModifier
    footstepSoundCollection:
      collection: FootstepPlating
  - type: FootprintOwner
  - type: ShowHealthBars
  - type: ShowHealthIcons
  - type: Access
    enabled: false
    groups:
    - AllAccess
  - type: TriggerOnSpawn
  - type: SoundOnTrigger
    sound: /Audio/Vanilla/Effects/R1/Dash.ogg
  - type: Input
    context: "ghost"
  - type: InputMover
  - type: SpawnOnTrigger
    proto: R1DashTrack
  - type: TimedSpawner
    prototypes:
    - R1DashTrack
    chance: 1
    intervalSeconds: 1
    minimumEntitiesSpawned: 1
    maximumEntitiesSpawned: 1

- type: entity
  parent: [BaseMob, Incorporeal]
  categories: [ HideSpawnMenu ]
  id: R1DashTrack
  components:
  - type: Sprite
    sprite: Vanilla/Mobs/Silicon/chassis.rsi
    layers:
    - state: R1_Dash
  - type: TimedDespawn
    lifetime: 0.5

- type: entity
  categories: [ HideSpawnMenu ]
  id: FistfulOfDollar
  name: fistful of dollar
  description: +fistful of dollar
  components:
  - type: RechargeBasicEntityAmmo
    rechargeCooldown: 6
  - type: BasicEntityAmmoProvider
    proto: ReflectCoin
    capacity: 4
    count: 4
  - type: Gun
    soundEmpty: null
    projectileSpeed: 6

- type: entity
  id: FistfulOfDollarAction
  name: Fistful Of Dollar
  description: +Fistful Of Dollar +Ricoshot
  components:
  - type: WorldTargetAction
    icon: { sprite : Vanilla/Actions/R1.rsi, state: Fistful }
    event: !type:ActionGunShootEvent
    priority: 1
    checkCanAccess: false
    range: 0
    itemIconStyle: BigAction
  - type: InstantAction
    sound: !type:SoundPathSpecifier
      path: /Audio/Vanilla/Effects/R1/Fistful.ogg

- type: entity
  id: ActionToggleHealing
  name: Переключить ремонт
  description: Использовать кровь для ремонта обшивки, или копить её.
  components:
  - type: InstantAction
    itemIconStyle: BigAction
    priority: -20
    icon:
      sprite: Vanilla/Actions/R1.rsi
      state: Blood
    event: !type:ToggleHealingActionEvent
    useDelay: 1
