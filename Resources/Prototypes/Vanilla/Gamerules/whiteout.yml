- type: entity
  parent: BaseGameRule
  id: MeteorSwarmWhiteoutScheduler
  components:
  - type: GameRule
  - type: BasicStationEventScheduler
    minimumTimeUntilFirstEvent: 0
    minMaxEventTiming:
      min: 5
      max: 5
    scheduledGameRules: !type:NestedSelector
      tableId: BasicMeteorSwarmEventsTable

- type: entity
  id: Londoners
  components:
  - type: GameRule
    minPlayers: 10
  - type: AntagSelection
    agentName: roles-antag-londoner-name
    selectionTime: IntraPlayerSpawn
    definitions:
    - prefRoles: [ Londoner ]
      max: 2
      playerRatio: 10
      briefing:
        text: londoner-role-greeting
        color: "#609cf0"
        sound: "/Audio/Ambience/Antag/headrev_start.ogg"
      whitelist:
        components:
        - CanBeLondoner
      lateJoinAdditional: true
      components:
      - type: AddSkillPoints
        Points: 5
      mindRoles:
      - MindRoleLondoner
  - type: AntagObjectives
    objectives:
    - LondonerEscapeObjective
