- type: entity
  parent: BaseStructure
  name: frozen heat generator
  id: FrozenHeatGenerator
  description: You give children, it gives heat.. It gave before, at least..
  abstract: false
  components:
  - type: Sprite
    sprite: Vanilla/Structures/Decoration/HeatGenerator.rsi
    state: icon
    drawdepth: 5000
  - type: Transform
    noRot: true
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-1,-2.2,1,0"
        density: 50
        mask:
        - LargeMobMask
        layer:
        - WallLayer
  - type: Anchorable
    flags: anchorable
  - type: Physics
    bodyType: Static
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 500
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel:
            min: 60
            max: 120
          PartRodMetal10:
            min: 10
            max: 30
          MobRandomCommandCorpse:
            min: 1
            max: 2
          Ash:
            min: 4
            max: 10
          ReinforcedGirder:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
