# R-1 n R-2
- type: entity
  parent: [ BaseBorgChassis, FlyingMobBase ]
  id: R1Base
  description: Mne len tut che to pisat, zabeite her na anglichan.
  abstract: true
  components:
  - type: Sprite
    sprite: Vanilla/Mobs/Silicon/chassis.rsi
    layers:
    - state: R1_Body
      map: ["enum.BorgVisualLayers.Body", "movement"]
    - state: R1_Enabled
      map: ["enum.BorgVisualLayers.Light"]
      shader: unshaded
      visible: false
    - state: R1_Light
      shader: unshaded
      map: ["light","enum.BorgVisualLayers.LightStatus"]
      visible: false
  - type: BorgChassis
    maxModules: 4
    hasMindState: R1_Enabled
    noMindState: R1_Body
  - type: BorgTransponder
    sprite:
      sprite: Vanilla/Mobs/Silicon/chassis.rsi
      state: R1_Body
    name: cyborg
  - type: NpcFactionMember
    factions:
    - Dragon
  - type: AccessReader
    access: [ [ "CentralCommand" ] ]
  - type: MovementSpeedModifier
    baseWalkSpeed : 3.5
    baseSprintSpeed : 5.5
  - type: ContainerFill
    containers:
      borg_brain:
        - R1Head
      borg_module:
        - BorgModuleR1
        - BorgModuleTool
        - BorgModuleGPS
        - BorgModuleMusiqueR1
  - type: ItemSlots
    slots:
      cell_slot:
          name: power-cell-slot-component-slot-name-default
          startingItem: PowerCellAntiqueProto
  - type: PowerCellSlot
    cellSlotId: cell_slot
    fitsInCharger: true
  - type: Inventory
    templateId: borg
  - type: Hands
    showInHands: false
    disableExplosionRecursion: true
    canBeStripped: false
  - type: FootstepModifier
    footstepSoundCollection:
      collection: FootstepPlating
  - type: BloodSucker
    heal:
      groups:
        Brute: -2
        Burn: -2
    bloodlessPenalty:
      types:
        Heat: 1000
    amountOfBloodInStorage: 150
  - type: Explosive
    explosionType: DemolitionCharge
    totalIntensity: 30
    intensitySlope: 5
    maxIntensity: 30
    canCreateVacuum: false
  - type: Damageable
    damageContainer: Silicon
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawnInContainer: true
        spawn:
          OrganArachnidStomach:
            min: 2
            max: 2
          OrganHumanLiver:
            min: 2
            max: 2
          R1Heart:
            min: 1
            max: 1
          OrganHumanEyes:
            min: 2
            max: 2
          R1MusicCircuit:
            min: 1
            max: 1
          R1armDebuffed:
            min: 1
            max: 1
          Telecrystal1:
            min: 1
            max: 1
      - !type:SpillBehavior
        solution: Blood
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:EmptyContainersBehaviour
        containers:
        - borg_brain
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:ExplodeBehavior
  - type: MobThresholds
    thresholds:
      0: Alive
      200: Critical
      300: Dead
    stateAlertDict:
      Alive: R1Health
      Critical: R1Dead
      Dead: R1Dead
  - type: SiliconLawProvider
    laws: RedspaceLaw
  - type: ActionGun
    action: FistfulOfDollarAction
    gunProto: FistfulOfDollar
  - type: ActionGrant
    actions:
    - ActionViewLaws
    - ActionSlam
    - ActionDash
    - ActionToggleLighting
  - type: FootprintOwner
  - type: ShowHealthBars
  - type: ShowHealthIcons
  - type: IonStormTarget
    chance: 0
  - type: RandomMetadata
    nameSegments:
    - NamesR1
    - LastNamesR1
  - type: Access
    enabled: false
    groups:
    - AllAccess
  - type: MobPrice
    price: 1800000

- type: entity
  parent: R1Base
  id: R1
  components:
  - type: R1Role
  - type: MindRole
    antagPrototype: R1Antag
    roleType: SoloAntagonist
    exclusiveAntag: true
    antag: true

- type: entity
  parent: R1Base
  id: R1NotAntag
  suffix: NotAntag
  name: R-1

- type: entity
  categories: [ Spawner ]
  name: R-1
  parent: BaseAntagSpawner
  id: R1Spawner
  suffix: Spawner
  components:
  - type: GhostRole
    name: ghost-role-information-r1-name
    description: ghost-role-information-r1-description
    rules: ghost-role-information-antagonist-rules
    mindRoles:
    - MindRoleGhostRoleSoloAntagonist
  - type: Sprite
    layers:
    - state: green
    - sprite: Vanilla/Mobs/Silicon/chassis.rsi
      state: R1_Body

- type: localizedDataset
  id: NamesR1
  values:
    prefix: names-R1-dataset-
    count: 9

- type: localizedDataset
  id: LastNamesR1
  values:
    prefix: last-names-R1-dataset-
    count: 9

- type: entity
  parent: R1Base
  id: R2
  description: Mne len tut che to pisat, zabeite her na anglichan.
  components:
  - type: Sprite
    layers:
    - state: R2_Body
      map: ["enum.BorgVisualLayers.Body", "movement"]
    - state: R2_Enabled
      map: ["enum.BorgVisualLayers.Light"]
      shader: unshaded
      visible: false
  - type: BorgChassis
    hasMindState: R2_Enabled
    noMindState: R2_Body
  - type: BorgTransponder
    sprite:
      sprite: Vanilla/Mobs/Silicon/chassis.rsi
      state: R2_Body
  - type: NpcFactionMember
    factions:
    - NanoTrasen
  - type: MovementSpeedModifier
    baseWalkSpeed : 3.3
    baseSprintSpeed : 5.3
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawnInContainer: true
        spawn:
          OrganArachnidStomach:
            min: 2
            max: 2
          OrganHumanLiver:
            min: 2
            max: 2
          R1Heart:
            min: 1
            max: 1
          OrganHumanEyes:
            min: 2
            max: 2
          R2MusicCircuit:
            min: 1
            max: 1
          R2armDebuffed:
            min: 1
            max: 1
          PotatoAI:
            min: 1
            max: 1
          AnomalyCoreBluespace:
            min: 1
            max: 1
      - !type:SpillBehavior
        solution: Blood
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:ExplodeBehavior
  - type: MobThresholds
    thresholds:
      0: Alive
      250: Critical
      300: Dead
    stateAlertDict:
      Alive: R1Health
      Critical: R2Dead
      Dead: R2Dead
  - type: SiliconLawProvider
    laws: NTDefault
  - type: ActionGun
    action: FistfulOfDollarActionR2
    gunProto: FistfulOfDollarR2
  - type: ContainerFill
    containers:
      borg_brain:
        - OrganHumanBrain
      borg_module:
        - BorgModuleR2
        - BorgModuleTool
        - BorgModuleGPS
        - BorgModuleMusiqueR2
  - type: BloodSucker
    heal:
      groups:
        Brute: -1
        Burn: -1
    bloodlessPenalty:
      types:
        Heat: 4
    unitsRestoreToHealPerInterval: 2
    unitsDecayPerInterval: 0

# Scavenger

- type: entity
  parent: BaseBorgChassis
  id: ScavengerMachineBase
  description: Mne len tut che to pisat, zabeite her na anglichan.
  abstract: true
  components:
  - type: Sprite
    sprite: Vanilla/Mobs/Silicon/chassis.rsi
    layers:
    - state: SV_Body
      map: ["enum.BorgVisualLayers.Body", "movement"]
    - state: SV_Enabled
      map: ["enum.BorgVisualLayers.Light"]
      shader: unshaded
      visible: false
  - type: BorgChassis
    maxModules: 4
    hasMindState: SV_Enabled
    noMindState: SV_Body
    moduleWhitelist:
      tags:
        - BorgModuleGeneric
        - BorgModuleCargo
  - type: BorgTransponder
    sprite:
      sprite: Vanilla/Mobs/Silicon/chassis.rsi
      state: SV_Body
    name: scavenger
  - type: NpcFactionMember
    factions:
    - AllHostile
  - type: AccessReader
    access: [ [ "CentralCommand" ] ]
  - type: MovementSpeedModifier
    baseWalkSpeed : 3.5
    baseSprintSpeed : 4.5
  - type: ItemSlots
    slots:
      cell_slot:
          name: power-cell-slot-component-slot-name-default
          startingItem: PowerCellHigh
  - type: PowerCellSlot
    cellSlotId: cell_slot
    fitsInCharger: true
  - type: Hands
    showInHands: false
    disableExplosionRecursion: true
    canBeStripped: false
  - type: FootstepModifier
    footstepSoundCollection:
      collection: FootstepPlating
  - type: BloodSucker
    heal:
      groups:
        Brute: -1
    bloodlessPenalty:
      types:
        Heat: -30
    amountOfBloodInStorage: 50
    unitsRestoreToHealPerInterval: 10
    unitsDecayPerInterval: 0
  - type: Damageable
    damageContainer: Silicon
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 165
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawnInContainer: true
        spawn:
          OrganArachnidStomach:
            min: 1
            max: 2
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:ExplodeBehavior
  - type: MobThresholds
    thresholds:
      0: Alive
      150: Critical
      165: Dead
    stateAlertDict:
      Alive: R1Health
      Critical: R1Dead
      Dead: R1Dead
  - type: SiliconLawProvider
    laws: ScavengerLawMalf
  - type: ActionGrant
    actions:
    - ActionViewLaws
    - ActionSlam
  - type: FootprintOwner
  - type: ShowHealthBars
  - type: ShowHealthIcons
  - type: Skill
    RangeWeaponLevel: 0
    MeleeWeaponLevel: 2
    MedicineLevel: 0
    ChemistryLevel: 0
    EngineeringLevel: 2
    BuildingLevel: 1
    ResearchLevel: 0
    Atmosphere: false
    Piloting: true
    MusInstruments: false
    Botany: false
    Bureaucracy: false
  - type: RandomMetadata
    nameSegments:
    - NamesR1
    - LastNamesR1
  - type: Access
    enabled: false
    groups:
    - Cargo

- type: entity
  parent: ScavengerMachineBase
  id: ScavengerMachineMalf
  description: Mne len tut che to pisat, zabeite her na anglichan.
  suffix: Hostile
  components:
  - type: Sprite
    layers:
    - state: SV_Body
      map: ["enum.BorgVisualLayers.Body", "movement"]
    - state: SV_Enabled
      shader: unshaded
      visible: true
    - state: LiterallyNothing
      map: ["enum.BorgVisualLayers.Light"]
  - type: HTN
    rootTask:
      task: SimpleHostileCompound
    blackboard:
      NavSmash: !type:Bool
        true
  - type: InputMover
  - type: MobMover
  - type: Charger
    slotId: cell_slot
    chargeRate: 1000
  - type: EntityStorage
  - type: StorageFill
    contents:
      - id: ScavengerEndoskeleton
        prob: 0.6
      - id: LArmScavenger
        prob: 0.4
      - id: LLegScavenger
        prob: 0.4
      - id: RLegScavenger
        prob: 0.4
      - id: HeadScavenger
        prob: 0.3
      - id: ScavengerSwordArm
        prob: 0.3
      - id: BorgModuleMusiqueScavenger
        prob: 0.1
  - type: ContainerContainer
    containers:
      entity_storage: !type:Container
  - type: ContainerFill
    containers:
      borg_brain:
        - MMIFilled
      borg_module:
        - BorgModuleScavenger
        - BorgModuleMusiqueScavenger
        - BorgModuleTool
        - BorgModuleGPS
        - BorgModuleMining
        - BorgModuleGrapplingGun
        - BorgModuleAppraisal

