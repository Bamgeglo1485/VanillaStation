  slots:
    - name: back
      slotTexture: back
      slotFlags: BACK
      slotGroup: SecondHotbar
      stripTime: 6
      uiWindowPos: 2,1
      strippingWindowPos: 2,4
      displayName: ID

- type: body
  id: Scavenger
  name: "scavenger"
  root: torso
  slots:
    torso:
      part: TorsoHuman
      connections:
      - right_arm
    right_arm:
      part: RightArmHuman
      connections:
      - right_hand
    right_hand:
      part: RightHandHuman
