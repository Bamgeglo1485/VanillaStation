- type: entity
  parent: BaseItem
  id: HandWarmer
  name: одноразовая ручная грелка
  description: Одноразовая химическая грелка для экстренных ситуаций.
  components:
  - type: Sprite
    sprite: Vanilla/Objects/Tools/HandWarmer.rsi
    layers:
      - map: [ enum.ExpendableLightVisualLayers.Base ]
        state: icon
      - map: [ enum.ExpendableLightVisualLayers.Glow ]
        state: activated
        visible: false
  - type: Item
    size: Small
  - type: PointLight
    enabled: false
    radius: 0
    energy: 0
    color: "#5885ff"
    netsync: false
  - type: Appearance
  - type: ExpendableLight
    spentName: использованная одноразовая грелка для рук
    spentDesc: Уже бесполезна, но его можно восстановить в микроволновке.
    glowDuration: 120
    fadeOutDuration: 15
    iconStateOn: activated
    iconStateSpent: spended
    turnOnBehaviourID: turn_on
    fadeOutBehaviourID: fade_out
    litSound:
      path: /Audio/Effects/Chemistry/bubbles.ogg
    loopedSound: null
  - type: Warmer
    moleRatio: 0
    tileHeatStrength: 0
    heatMaxTemp: 313.15
    bodyHeatStrength: 3500
    onlyWeared: true

- type: entity
  parent: HeatLamp
  id: OldHeatLamp
  name: древняя тепловая лампа
  description: Тепловая лампа, которая когда то служила при строительстве станций, но её конструкция довольно устарела, так как выбрасывала пар в атмосферу.
  components:
  - type: Sprite
    sprite: Vanilla/Objects/Devices/old_heatlamp.rsi
  - type: Clothing
    sprite: Vanilla/Objects/Devices/old_heatlamp.rsi
  - type: PointLight
    enabled: false
    radius: 12
    energy: 2
    color: "#FFC458"
    netsync: false
  - type: StaticPrice
    price: 3200
  - type: Warmer
    gasType: WaterVapor
    moleRatio: 0.025
    tileHeatStrength: 1.5
    heatMaxTemp: 313.15
    bodyHeatStrength: 3000
