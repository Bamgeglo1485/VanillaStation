# Flamethrower

- type: entity
  categories: [ HideSpawnMenu ]
  parent: BaseBulletTrigger
  id: ProjectileFlame
  name: flame
  description: Try not to get toasted.
  components:
  - type: PointLight
    color: "#e29522"
    radius: 3.0
    energy: 5.0
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/magic.rsi
    layers:
    - state: fireball
      shader: unshaded
  - type: Projectile
    damage:
      types:
        Heat: 15
    deleteOnCollide: true
  - type: IgnitionSource
    temperature: 1000
    ignited: true
  - type: TimedDespawn
    lifetime: .8
  - type: IgniteOnCollide
    fireStacks: .25
  - type: RepeatingTrigger
    delay: .15
  - type: SpawnOnTrigger
    proto: FloorFire
  - type: Fixtures
    fixtures:
      projectile:
        shape:
          !type:PhysShapeCircle
          radius: 0.4
        density: 100
        hard: false
        mask:
        - Impassable
        - BulletImpassable
      trigger:
        shape:
          !type:PhysShapeCircle
          radius: 0.4
        density: 100
        hard: false
        layer:
        - WallLayer
  - type: Reactive
    groups:
      Extinguish: [Touch]
    reactions:
    - reagents: [Water, SoapReagent]
      methods: [Touch]
      effects:
      - !type:HealthChange
        scaleByQuantity: true
        damage:
          types:
            Blunt: 10
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 10
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

# R-1

- type: entity
  id: ShotCoreEjectProjectile
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    layers:
    - state: grapeshot
  - type: Projectile
    damage:
      types:
        Piercing: 11

- type: entity
  id: ShotCoreEject
  categories: [ HideSpawnMenu ]
  parent: ShotCoreEjectProjectile
  components:
  - type: ProjectileSpread
    proto: ShotCoreEjectProjectile
    count: 4
    spread: 10

- type: entity
  id: ShotCoreEjectProjectileHeat
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles_tg.rsi
    layers:
    - state: omnilaser_greyscale
      shader: unshaded
      color: orangered
  - type: Projectile
    impactEffect: BulletImpactEffectOrangeDisabler
    damage:
      types:
        Heat: 8
        Piercing: 3
  - type: ChangeTemperatureOnCollide
    heat: 10000

- type: entity
  name: shot
  id: ShotCoreEjectHeat
  categories: [ HideSpawnMenu ]
  parent: ShotCoreEjectProjectileHeat
  components:
  - type: ProjectileSpread
    proto: ShotCoreEjectProjectileHeat
    count: 5
    spread: 20

- type: entity
  id: CoreEjectProjectile
  name: core
  parent: BaseBulletTrigger
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    layers:
      - state: uranium
  - type: DeleteOnTrigger
  - type: ProjectileGrenade
    fillPrototype: ProjectileFlameCoreEject
    capacity: 30
  - type: ContainerContainer
    containers:
      cluster-payload: !type:Container
  - type: Explosive
    explosionType: FireBomb
    totalIntensity: 100
    intensitySlope: 1
    maxIntensity: 100
  - type: ExplodeOnTrigger

- type: entity
  categories: [ HideSpawnMenu ]
  parent: ProjectileFlame
  id: ProjectileFlameCoreEject
  components:
  - type: Projectile
    damage:
      types:
        Heat: 1
    deleteOnCollide: true
  - type: TimedDespawn
    lifetime: .3
  - type: RepeatingTrigger
    delay: .1
